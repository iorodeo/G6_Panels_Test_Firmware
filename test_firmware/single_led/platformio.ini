; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350
framework = arduino
board_build.core = earlephilhower
lib_deps =
    ArduinoEigen
    Streaming

; Flash Size: 2MB (No FS)
board_build.filesystem_size = 0m

; PSRAM size: 8MB
board_upload.psram_length = 8388608

; PSRAM CS is at GP47 (v0p3)
build_flags = -DRP2350_PSRAM_CS=47

; USB manufacturer name
board_build.arduino.earlephilhower.usb_manufacturer = Reiser Lab

; USB product name
board_build.arduino.earlephilhower.usb_product = RP2354 20x20 Display Panel

; USB vendor id (0x2E8A = Raspberry Pi Foundation)
board_build.arduino.earlephilhower.usb_vid = 0x2E8A

; USB device id
;   0x0009 = USB serial device  (flashing/debugging)
;   0x000f = USB mass storage device (bootloader mode)
board_build.arduino.earlephilhower.usb_pid = 0x0009


[env:single_led]
build_src_filter = +<*> -<main_*.cpp> +<main_single_led.cpp>

[env:pattern]
build_src_filter = +<*> -<main_*.cpp> +<main_pattern.cpp>

[env:single_led_batch0_1_3]
build_src_filter = +<*> -<main_*.cpp> +<main_single_led_batch0.1.3.cpp>

[env:pattern_batch0_1_3]
build_src_filter = +<*> -<main_*.cpp> +<main_pattern_batch0.1.3.cpp>

[env:led_check]
build_src_filter = +<*> -<main_*.cpp> +<main_led_check.cpp>

; Minimal firmware: only main_minimal.cpp is built. No constants.cpp, no utilities.cpp,
; no global std::map init, no Eigen, no PSRAM. Used to isolate whether the v0p3 panel
; is failing because of something in the firmware tree or something on the hardware.
[env:minimal]
build_src_filter = -<*> +<main_minimal.cpp>
build_unflags = -DRP2350_PSRAM_CS=47
lib_deps =
