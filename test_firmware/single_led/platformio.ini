; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350
framework = arduino
board_build.core = earlephilhower
lib_deps =
    ArduinoEigen
    Streaming

; Flash Size: 2MB (No FS)
board_build.filesystem_size = 0m

; USB manufacturer name
board_build.arduino.earlephilhower.usb_manufacturer = Reiser Lab

; USB product name
board_build.arduino.earlephilhower.usb_product = G6 Modular LED Panel

; USB vendor id (0x2E8A = Raspberry Pi Foundation)
board_build.arduino.earlephilhower.usb_vid = 0x2E8A

; USB device id
;   0x0009 = USB serial device  (flashing/debugging)
;   0x000f = USB mass storage device (bootloader mode)
board_build.arduino.earlephilhower.usb_pid = 0x0009


; ---------------------------------------------------------------------------
; Hardware revision profiles
; ---------------------------------------------------------------------------
; v0.1 (RP2354A02): CS=33, COL=1..20, ROW=21..31,36..44, inverted LED polarity, no PSRAM
[hw_v0_1]
build_flags =
    -DPANEL_HW_REV=1
    -DRP2350_PSRAM_CS=0
board_upload.psram_length = 8388608

; v0.2 (RP2354A04): CS=33, COL=1..20, ROW=21..31,36..44, correct LED polarity, no PSRAM
[hw_v0_2]
build_flags =
    -DPANEL_HW_REV=2
    -DRP2350_PSRAM_CS=0
board_upload.psram_length = 8388608

; v0.3 (RP2354A04): CS=41, COL=0..19, ROW=20..39, correct LED polarity, 8MB PSRAM on GPIO47
[hw_v0_3]
build_flags =
    -DPANEL_HW_REV=3
    -DRP2350_PSRAM_CS=47
board_upload.psram_length = 8388608


; ---------------------------------------------------------------------------
; Firmware variants x hardware revisions
; ---------------------------------------------------------------------------
[env:single_led_v0_1]
extends = hw_v0_1
build_src_filter = +<*> -<apps/*.cpp> +<apps/single_led.cpp>

[env:single_led_v0_2]
extends = hw_v0_2
build_src_filter = +<*> -<apps/*.cpp> +<apps/single_led.cpp>

[env:single_led_v0_3]
extends = hw_v0_3
build_src_filter = +<*> -<apps/*.cpp> +<apps/single_led.cpp>

[env:pattern_v0_1]
extends = hw_v0_1
build_src_filter = +<*> -<apps/*.cpp> +<apps/pattern.cpp>

[env:pattern_v0_2]
extends = hw_v0_2
build_src_filter = +<*> -<apps/*.cpp> +<apps/pattern.cpp>

[env:pattern_v0_3]
extends = hw_v0_3
build_src_filter = +<*> -<apps/*.cpp> +<apps/pattern.cpp>

[env:led_check_v0_1]
extends = hw_v0_1
build_src_filter = +<*> -<apps/*.cpp> +<apps/led_check.cpp>

[env:led_check_v0_2]
extends = hw_v0_2
build_src_filter = +<*> -<apps/*.cpp> +<apps/led_check.cpp>

[env:led_check_v0_3]
extends = hw_v0_3
build_src_filter = +<*> -<apps/*.cpp> +<apps/led_check.cpp>


; Minimal firmware: only main_minimal.cpp is built. No constants, no utilities,
; no global std::map init, no Eigen, no PSRAM. Used to isolate whether a panel
; is failing because of something in the firmware tree or something on the
; hardware. Revision-agnostic liveness probe on GPIO0..39.
[env:minimal]
build_src_filter = -<*> +<apps/minimal.cpp>
build_flags = -DRP2350_PSRAM_CS=0
lib_deps =
